<!DOCTYPE html>
<html>
  <head>
    <title>Your Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <!-- adding jquery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  </head>
  <body>
    <header>
      <h1>
        This is your Giga Pet
      </h1>
    </header>

    <main>
      <section class="pet-image-container">
         <!-- Replace pet image with your own pet image -->
        <img class="pet-image" src="images/pet_img.jpeg">

        <!-- pet message when buttons are clicked -->
        <p class="pet-message">RUFF!</p>
      </section>

      <section class="dashboard">
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> tail wags (per min)</strong></div>
        <div>Energy: <strong><span class="energy"></span> Energy meter</strong></div>
        <div class="stat">
          <span class="stat-label">Happiness:</span>
          <div id="happiness-bar-cont" class="bar-container">
          </div>
        </div>
        <div class="stat">
          <span class="stat-label">Energy:</span>
          <div id="energy-bar-cont" class="bar-container">
          </div>
        </div>
        <div class="button-container">
          <!-- nap btn: disables other buttons for 5 sec, increases happiness and energy  -->
          <button class="nap-button">
            Nap
          </button>
          <button class="treat-button">
            Treat
          </button>
          <button class="play-button">
            Play
          </button>
          <button class="exercise-button">
            Exercise
          </button>
          <button class="joke-button">
            Tell Joke
          </button>
        </div>
      </section>
    </main>

    <!-- Your web-app is https, so your scripts need to be too -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
  </body>
</html>
